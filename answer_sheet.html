<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{科目名}} {{試験名}} 解答用紙</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap');
    @page {
      size: A4;
      margin: 20mm;
      @top-left    { content: none; }
      @top-center  { content: none; }
      @top-right   { content: none; }
      @bottom-left { content: none; }
      @bottom-center {
        content: "- " counter(page) " -";
        font-size: 9pt;
        font-family: serif;
      }
      @bottom-right { content: none; }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Serif JP", "Noto Serif CJK JP", serif;
      font-size: 10.5pt;
      color: #000;
      width: 170mm;
      margin: 20mm auto;
    }

    @media print {
      body { margin: 0; width: 100%; }
    }

    /* ヘッダー */
    .exam-header {
      border: 1.5px solid #000;
      padding: 6px 10px;
      margin-bottom: 1.4em;
    }

    .exam-title {
      font-size: 13pt;
      font-weight: bold;
      text-align: center;
      margin-bottom: 4px;
    }

    .exam-info {
      display: flex;
      justify-content: space-between;
      font-size: 9.5pt;
      margin-bottom: 6px;
    }

    .exam-fields {
      display: flex;
      gap: 1.5em;
      font-size: 10pt;
      border-top: 1px solid #ccc;
      padding-top: 6px;
    }

    .field {
      display: flex;
      align-items: baseline;
      gap: 0.4em;
    }

    .field-label { white-space: nowrap; font-weight: bold; }

    .field-line {
      border-bottom: 1.5px solid #000;
      flex: 1;
      height: 10mm;
    }

    /* 解答リスト */
    .section { margin-top: 0.9em; }

    .ans-row {
      display: flex;
      align-items: flex-start;
      gap: 0.5em;
      padding: 3px 0;
    }

    .q-major {
      width: 10mm;
      flex-shrink: 0;
      font-weight: bold;
      text-align: right;
    }

    .ans-item {
      display: flex;
      align-items: flex-start;
      gap: 0.3em;
      flex: 1;
    }

    .q-minor {
      width: 8mm;
      flex-shrink: 0;
      text-align: center;
    }

    .ans-wrap {
      display: flex;
      align-items: flex-end;
      gap: 2px;
    }

    .ans-mantissa {
      border: 1px solid #000;
      width: 40mm;
      height: 12mm;
    }

    .ans-op {
      padding-bottom: 1px;
      white-space: nowrap;
      font-size: 10pt;
    }

    .ans-exp {
      border: 1px solid #000;
      width: 15mm;
      height: 12mm;
      position: relative;
      bottom: 3.5mm; /* 上付き (10^W の指数) を、行の高さに影響させずに浮かせる */
    }

    /* 選択・記号解答欄 (記号を1つ書く小さめの枠) */
    .ans-choice {
      border: 1px solid #000;
      width: 60mm;
      height: 12mm;
    }

    /* 自由記述欄 (大きな枠。文章・計算過程・作図などに) */
    .ans-free-item {
      display: flex;
      align-items: flex-start;
      gap: 0.3em;
      flex: 1;
    }

    .ans-free {
      border: 1px solid #000;
      width: 100%;
      min-height: 30mm;
    }

    /* 文字マス目 (コード記述欄): 1文字1マス。罫線は border で印刷確実 */
    .ans-code-item {
      display: flex;
      align-items: flex-start;
      gap: 0.3em;
      flex: 1;
    }

    .ans-code {
      display: grid;
      grid-template-columns: repeat(24, 6mm); /* 列数。コード幅に応じて変える */
      grid-auto-rows: 6mm;                    /* 1マスの高さ */
      width: max-content;
      border-top: 1px solid #000;
      border-left: 1px solid #000;
    }

    .ans-code .cell {
      border-right: 1px solid #000;
      border-bottom: 1px solid #000;
    }

    /* 横罫線欄 (コード・記述向け): 横線のみ。罫線は border で印刷確実 */
    .ans-lined-item {
      display: flex;
      align-items: flex-start;
      gap: 0.3em;
      flex: 1;
    }

    .ans-lined {
      width: 100%;
      border: 1px solid #000;
      border-bottom: none; /* 最下行の .line の border-bottom が枠の下辺になる */
    }

    .ans-lined .line {
      height: 8mm;          /* 1 行の高さ */
      border-bottom: 1px solid #000;
    }
  </style>
</head>
<body>

<!--
  ============================================================
  解答用紙テンプレート (生徒記入用 / 科目非依存)
  使い方:
    1. {{...}} を科目ごとの値に置き換える。
    2. <div class="section"> を大問ごとに1つ用意する。
    3. 各大問の最初の行だけ <span class="q-major">問N</span> を書き、
       2行目以降は空の <span class="q-major"></span> にする。

  解答欄は問題の形式に合わせて5種類から選ぶ (下に問1〜問5の例):
    A. 指数表記   .ans-wrap   … 仮数 × 10^指数 のマス目 (数値計算問題)
    B. 選択・記号 .ans-choice … 記号を1つ書く小さめの枠 (選択問題)
    C. 自由記述   .ans-free   … 文章・計算過程・作図などの大きな枠
    D. 文字マス目 .ans-code   … 1文字1マスのグリッド (コード記述)
    E. 横罫線     .ans-lined  … 横線のみの罫線欄 (コード・記述)

  A と B は 1 行 (.ans-row) に小問 (.ans-item) を最大2つ並べる。
  小問が奇数で余ったら、空の <div class="ans-item"></div> で埋める。
  C・D・E は幅が広いので 1 行 1 小問。
  ============================================================
-->

<div class="exam-header">
  <div class="exam-title">{{科目名}} {{試験名}}　解答用紙</div>
  <div class="exam-info">
    <span>{{年度}}</span>
    <span>試験時間: {{試験時間}}　／　配点: {{配点}}</span>
  </div>
  <div class="exam-fields">
    <div class="field" style="flex: 1.5;">
      <span class="field-label">出席番号 {{クラス記号}}-</span>
      <span class="field-line field-line"></span>
    </div>
    <div class="field" style="flex: 2;">
      <span class="field-label">氏名</span>
      <span class="field-line"></span>
    </div>
    <div class="field" style="flex: 1;">
      <span class="field-label">点数</span>
      <span class="field-line field-line"></span>
    </div>
  </div>
</div>

<!-- ===== A. 指数表記 (数値計算問題): 仮数 × 10^指数 のマス目 ===== -->
<!-- 小問が M 個なら、2 個ずつ ans-row に並べる -->
<div class="section">
  <div class="ans-row">
    <span class="q-major">問1</span>
    <div class="ans-item"><span class="q-minor">(1)</span><div class="ans-wrap"><span class="ans-mantissa"></span><span class="ans-op"> × 10</span><span class="ans-exp"></span></div></div>
    <div class="ans-item"><span class="q-minor">(2)</span><div class="ans-wrap"><span class="ans-mantissa"></span><span class="ans-op"> × 10</span><span class="ans-exp"></span></div></div>
  </div>
  <div class="ans-row">
    <span class="q-major"></span>
    <div class="ans-item"><span class="q-minor">(3)</span><div class="ans-wrap"><span class="ans-mantissa"></span><span class="ans-op"> × 10</span><span class="ans-exp"></span></div></div>
    <div class="ans-item"></div><!-- 小問が奇数のときの空き埋め -->
  </div>
</div>

<!-- ===== B. 選択・記号 (選択問題): 記号を1つ書く枠 ===== -->
<!-- 問題文に選択肢 (ア〜エ / A〜D / 1〜4 など) を示し、ここに記号を記入させる -->
<div class="section">
  <div class="ans-row">
    <span class="q-major">問2</span>
    <div class="ans-item"><span class="q-minor">(1)</span><span class="ans-choice"></span></div>
    <div class="ans-item"><span class="q-minor">(2)</span><span class="ans-choice"></span></div>
  </div>
  <div class="ans-row">
    <span class="q-major"></span>
    <div class="ans-item"><span class="q-minor">(3)</span><span class="ans-choice"></span></div>
    <div class="ans-item"></div><!-- 小問が奇数のときの空き埋め -->
  </div>
</div>

<!-- ===== C. 自由記述 (記述問題): 大きな枠。1 行 1 小問 ===== -->
<!-- 文章・計算過程・作図など。高さは min-height を style で個別調整してよい -->
<div class="section">
  <div class="ans-row">
    <span class="q-major">問3</span>
    <div class="ans-free-item"><span class="q-minor">(1)</span><div class="ans-free"></div></div>
  </div>
  <div class="ans-row">
    <span class="q-major"></span>
    <div class="ans-free-item"><span class="q-minor">(2)</span><div class="ans-free" style="min-height: 45mm;"></div></div>
  </div>
</div>

<!-- ===== D. 文字マス目 (コード記述): 1文字1マス。1 行 1 小問 ===== -->
<!-- インデントはマス数でそろう。列数は .ans-code の grid-template-columns、

      </div>
    </div>
  </div>
</div>

<!-- ===== E. 横罫線 (コード・記述): 横線のみ。1 行 1 小問 ===== -->
<!-- 行数は .line の個数、行高は .line の height で決まる。下は 10 行 -->

  <div class="ans-row">
    <span class="q-major">問5</span>
    <div class="ans-lined-item">
