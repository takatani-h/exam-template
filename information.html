<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{和暦年度}} 試験 {{試験名}} — 試験情報</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&display=swap');

    @page {
      size: A4;
      margin: 20mm;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Serif JP", "Noto Serif CJK JP", serif;
      font-size: 11pt;
      line-height: 1.6;
      color: #000;
      width: 170mm;
      margin: 20mm auto;
    }

    @media print {
      body { margin: 0; width: 100%; }
    }

    /* ===== ヘッダ ({{和暦年度}}　{{試験名}}　試　験 を一行で中央揃え) ===== */
    .info-header {
      text-align: center;
      font-size: 15pt;
      margin-bottom: 0.8em;
    }

    /* ===== 情報テーブル共通 ===== */
    .info-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .info-table + .info-table { margin-top: 8mm; }

    .info-table th,
    .info-table td {
      border: 1px solid #000;
      padding: 4px 8px;
      vertical-align: middle;
    }

    /* 左の項目名: 文字を均等割り付けして様式に寄せる */
    .info-table th {
      width: 34mm;
      font-weight: normal;
      text-align: justify;
      text-align-last: justify;
      white-space: nowrap;
    }

    /* 項目名に添える小さな補足 (教科担当) (余部) (指定された物品) */
    .info-table th .sub {
      display: block;
      font-size: 8.5pt;
      text-align: center;
      text-align-last: center;
      letter-spacing: 0;
    }

    .info-table td { text-align: center; }

    /* 左寄せにしたい値のセル */
    .info-table td.left { text-align: left; }

    /* 様式で大きく太字になる値 (科目名・持込可の物) */
    .val-big {
      font-size: 13pt;
      font-weight: 700;
    }

    /* 値の補助行 (担当者名・内訳・注意書きなど) */
    .val-note {
      font-size: 10pt;
    }

    .val-note.right { text-align: right; display: block; }

    /* 当日記入する空欄 (欠席・遅刻) */
    .blank-line {
      display: flex;
      justify-content: space-between;
      padding: 0 4mm;
    }

    /* 注意書き (※ で始まる固定文) */
    .caution {
      display: block;
      font-size: 9.5pt;
      text-align: left;
      margin-bottom: 0.3em;
    }

    /* その他必要事項の記入スペース */
    .free-cell { height: 32mm; }
  </style>
</head>
<body>

<!--
  ============================================================
  試験情報シート (試験事務提出用 / 様式に寄せた清書)
  使い方:
    1. information.md を正本として {{...}} を埋める。
    2. その値をこの html の各セルに反映する。
    3. ブラウザで開き A4 で印刷する。
  ※ 「※下敷・筆入は…」「※試験開始後30分間は…」は様式固定の注意文。
     欠席・遅刻欄は当日記入用に空欄のまま。
  ============================================================
-->

<div class="info-header">{{和暦年度}}　{{試験名}}　試　験</div>

<!-- ===== 上段: 試験情報 ===== -->
<table class="info-table">
  <colgroup>
    <col style="width: 34mm;">
    <col>
  </colgroup>
  <tr>
    <th>試験日</th>
    <td class="left">{{試験日}}</td>
  </tr>
  <tr>
    <th>学年・組</th>
    <td>{{学年組}}</td>
  </tr>
  <tr>
    <th>試験科目名<span class="sub">(教科担当)</span></th>
    <td class="left">
      <span class="val-big">{{科目名}}</span>
      <span class="val-note right">({{教科担当}})</span>
    </td>
  </tr>
  <tr>
    <th>試験時間</th>
    <td>{{試験時間}}</td>
  </tr>
  <tr>
    <th>監督教員名</th>
    <td class="left">{{監督教員名}}</td>
  </tr>
  <tr>
    <th>問題部数<span class="sub">(余部)</span></th>
    <td>{{問題部数}}</td>
  </tr>
  <tr>
    <th>受験学生数</th>
    <td>
      {{受験学生数}}
      <span class="blank-line val-note">
        <span>(欠席学生：</span><span>)</span>
      </span>
      <span class="blank-line val-note">
        <span>(遅刻学生：</span><span>)</span>
      </span>
    </td>
  </tr>
  <tr>
    <th>回収する物</th>
    <td class="left">{{回収する物}}</td>
  </tr>
</table>

<!-- ===== 下段: 試験運用 ===== -->
<table class="info-table">
  <colgroup>
    <col style="width: 34mm;">
    <col>
  </colgroup>
  <tr>
    <th>筆記用具以外で<br>持込可の物<span class="sub">(指定された物品)</span></th>
    <td class="left">
      <span class="caution">※下敷・筆入は使用不可です。ご注意ください。</span>
      <span class="val-big">{{持込可の物}}</span>
    </td>
  </tr>
  <tr>
    <th>退室可能時間</th>
    <td class="left">
      <span class="caution">※試験開始後30分間は、退室を認めないでください。</span>
      <span style="display:block; text-align:center;">{{退室可能時間}}</span>
    </td>
  </tr>
  <tr>
    <th>その他必要事項</th>
    <td class="left free-cell">{{その他必要事項}}</td>
  </tr>
</table>

</body>
</html>
